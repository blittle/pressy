name: Deploy Moby-Dick to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  pull-requests: write

concurrency:
  group: deploy-moby-dick-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Re-install to link workspace bins
        run: pnpm install --frozen-lockfile

      - name: Build moby-dick
        run: pnpm --filter moby-dick-example build

      - name: Deploy to Cloudflare Pages
        id: deploy
        working-directory: examples/moby-dick
        run: |
          BRANCH_FLAG=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_FLAG="--branch=${{ github.head_ref }}"
          fi
          OUTPUT=$(npx wrangler pages deploy dist --project-name=moby-dick $BRANCH_FLAG 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.pages\.dev' | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.url
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloudflare-preview
          message: |
            **Cloudflare Preview Deploy** :cloud:
            ${{ steps.deploy.outputs.url }}
