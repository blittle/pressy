name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Re-install to link workspace bins
        run: pnpm install --frozen-lockfile

      - name: Build all examples
        run: |
          pnpm --filter flatland-example build
          pnpm --filter frankenstein build
          pnpm --filter moby-dick-example build

      - name: Assemble site
        run: |
          mkdir -p _site/flatland _site/frankenstein _site/moby-dick
          cp -r examples/flatland/dist/* _site/flatland/
          cp -r examples/frankenstein/dist/* _site/frankenstein/
          cp -r examples/moby-dick/dist/* _site/moby-dick/
          cat > _site/index.html << 'LANDING'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Pressy Examples</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; color: #1a1a1a; min-height: 100dvh; display: flex; align-items: center; justify-content: center; }
              .container { max-width: 640px; width: 100%; padding: 2rem; }
              h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
              p { color: #666; margin-bottom: 2rem; }
              .books { display: flex; flex-direction: column; gap: 1rem; }
              a.book { display: block; padding: 1.25rem 1.5rem; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; text-decoration: none; color: inherit; transition: border-color 0.15s, box-shadow 0.15s; }
              a.book:hover { border-color: #999; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
              .book-title { font-weight: 600; font-size: 1.1rem; }
              .book-author { color: #666; font-size: 0.9rem; margin-top: 0.25rem; }
              .book-meta { color: #999; font-size: 0.8rem; margin-top: 0.25rem; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Pressy Examples</h1>
              <p>Example books built with Pressy, a web framework for self-publishing.</p>
              <div class="books">
                <a class="book" href="flatland/">
                  <div class="book-title">Flatland: A Romance of Many Dimensions</div>
                  <div class="book-author">Edwin A. Abbott</div>
                </a>
                <a class="book" href="frankenstein/">
                  <div class="book-title">Frankenstein; or, The Modern Prometheus</div>
                  <div class="book-author">Mary Wollstonecraft Shelley</div>
                </a>
                <a class="book" href="moby-dick/">
                  <div class="book-title">Moby-Dick; or, The Whale</div>
                  <div class="book-author">Herman Melville</div>
                  <div class="book-meta">135 chapters &middot; 211,000+ words</div>
                </a>
              </div>
            </div>
          </body>
          </html>
          LANDING

      - name: Deploy main site
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: false
          destination_dir: .

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site
          umbrella-dir: pr-preview
          token: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean up PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site
          umbrella-dir: pr-preview
          token: ${{ secrets.GITHUB_TOKEN }}
          action: remove
